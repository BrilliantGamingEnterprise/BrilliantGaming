<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <link rel="stylesheet" href="styles.css" />

</head>
<body class="page-category" data-page="apac">
  <div class="page-shell">
    <header class="site-header">
      <div class="header-container">
      <a class="brand" href="index.html">
        <img src="assets/images/7a0a2ed3-adc1-45c6-9409-3e41c6478d4a.png" alt="Brilliant Gaming" class="brand-logo" />
        <span class="brand-text"></span>

    <section class="hero">

            <button id="cartToggleMobile" class="button button-primary">打开购物车</button>
          </div>
        </div>
        <div class="hero-visual">
          <p>全面展示区域热门游戏，让客户更快找到适合项目。</p>
        </div>
      </div>
    </section>

    <section class="featured-section search-results hidden" id="searchResultsSection">
      <div class="section-header">
        <div>
          <h2>搜索结果</h2>
          <p id="searchResultsCount">请输入关键词开始搜索</p>
        </div>
        <button id="clearSearch" class="button button-secondary">清除搜索</button>
      </div>
      <div id="searchResultsGrid" class="game-grid"></div>
    </section>

    <section class="category-section searchable-section">
      <div class="section-header">
        <div>

          <p id="pageSubtitle">首页已展示精选 9 个，完整区域游戏列表请查看下方。</p>
        </div>
      </div>
      <div id="gamesGrid" class="game-grid"></div>

    <footer class="footer">

        <h4>Brilliant Gaming Enterprise</h4>
        <p>新马港澳台游戏充值页面，黑金电竞风营销风格与实用搜索功能相结合。</p>

      </div>
    </footer>
  </div>

  <aside class="cart-panel" id="cartPanel">
    <header>
      <div>
        <h3>购物车</h3>
        <p id="cartSummary" style="margin:0;color:rgba(255,255,255,0.75);font-size:0.95rem;">已选商品 0 项</p>
      </div>
      <button id="cartClose" class="button button-secondary">关闭</button>
    </header>
    <div class="cart-body" id="cartList"></div>
    <footer>
      <div class="cart-total-row">
        <span>合计</span>
        <span id="cartTotal">￥0</span>
      </div>
      <button id="clearCartButton" class="button button-secondary">清空购物车</button>
      <button id="copyCartButton" class="button button-primary">复制购物单</button>
    </footer>
  </aside>

  <script src="scripts.js?v=14"></script>

</html>
